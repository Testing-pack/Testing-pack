  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    hostname: spark-master
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master -h spark-master
    environment:
      - SPARK_LOCAL_IP=spark-master
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - .:/opt/spark/jobs
    networks:
      - kafka-spark-network

  spark-worker-1:
    build:
      context: ./spark
      dockerfile: Dockerfile
    hostname: spark-worker-1
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_LOCAL_IP=spark-worker-1
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - .:/opt/spark/jobs
    networks:
      - kafka-spark-network

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5
    restart: always
    networks:
      - kafka-spark-network

  redis:
    image: redis:latest
    expose:
      - 6379
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 30s
      retries: 50
    restart: always
    networks:
      - kafka-spark-network

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - kafka-spark-network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - kafka-spark-network

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - kafka-spark-network

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    networks:
      - kafka-spark-network

  init-airflow-connections:
    <<: *airflow-common
    command: >
      bash -c "
        echo 'Ожидаем готовности базы данных Airflow...';
        until airflow db check; do
          echo 'База данных не готова. Ждем 5 секунд...';
          sleep 5;
        done;
        echo 'База данных готова. Пытаемся создать коннектор spark_default...';
        if ! airflow connections get spark_default 2>/dev/null; then
          airflow connections add spark_default --conn-type spark --conn-host spark://spark-master --conn-port 7077 --conn-extra '{\"queue\": \"default\"}';
          echo 'Коннектор spark_default успешно создан.';
        else
          echo 'Коннектор spark_default уже существует.';
        fi
        echo 'Пытаемся создать коннектор trino_default...';
        if ! airflow connections get trino_default 2>/dev/null; then
          airflow connections add trino_default --conn-type trino --conn-host trino --conn-port 8080 --conn-login 'trino' --conn-password '' --conn-extra '{"catalog": "iceberg", "schema": "silver"}';
          echo 'Коннектор trino_default успешно создан.';
        else
          echo 'Коннектор trino_default уже существует.';
        fi
      "

    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    restart: "no"
    networks:
      - kafka-spark-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"
      - "9030:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - kafka-spark-network

  trino:
    build:
      context: .
      dockerfile: Dockerfile.trino
    container_name: trino
    hostname: trino
    ports:
      - "8082:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - kafka-spark-network
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/info" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  superset-init:
    image: apache/superset:3.1.3
    container_name: superset-init
    command: >
      bash -c "
      superset db upgrade &&
      superset fab create-admin --username $${SUPERSET_ADMIN_USER} --firstname Admin --lastname User --email admin@ab-test.local --password $${SUPERSET_ADMIN_PASSWORD} || true &&
      superset init
      "
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - superset-home:/app/superset_home
    networks:
      - kafka-spark-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  superset:
    image: apache/superset:3.1.3
    container_name: superset
    command: >
      bash -c "
      python -m pip install sqlalchemy-trino &&
      superset run -h 0.0.0.0 -p 8088
      "
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - superset-home:/app/superset_home
    networks:
      - kafka-spark-network
    depends_on:
      superset-init:
        condition: service_completed_successfully
    restart: always

networks:
  kafka-spark-network:
    driver: bridge

volumes:
  postgres-db-volume:
  clickhouse_data:
  superset-home: